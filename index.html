<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abivax AI Predictor</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="p-4 border-b border-slate-700 flex justify-between items-center">
        <h1 class="font-bold text-xl text-blue-400">ABVX AI 2.0</h1>
        <span class="bg-green-500 text-xs px-2 py-1 rounded-full animate-pulse">LIVE 15M</span>
    </div>

    <div id="chart_container" style="height: 45vh; width: 100%;"></div>

    <div class="card">
        <h3 class="text-slate-400 text-sm font-semibold mb-2 uppercase">Analyse Sentiment (Reuters/X)</h3>
        <div class="flex justify-between items-center mb-4">
            <span id="sentiment-label" class="text-2xl font-bold text-green-400 font-mono italic">TRÈS POSITIF</span>
            <div class="text-right">
                <div class="text-xs text-slate-500 italic">Dernier Tweet Trump</div>
                <div class="text-sm font-semibold">"Bullish on Pharma"</div>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 border-t border-slate-700 pt-4">
            <div>
                <span class="text-xs text-slate-500 uppercase">Probabilité 7 Jours</span>
                <div id="p7" class="text-xl font-bold text-blue-300">78.4% ↑</div>
            </div>
            <div>
                <span class="text-xs text-slate-500 uppercase">Probabilité 1 Mois</span>
                <div id="p30" class="text-xl font-bold text-blue-300">62.1% ↑</div>
            </div>
        </div>
    </div>

    <div class="card bg-slate-900 border-none">
        <div class="flex justify-around text-center text-xs">
            <div><div class="text-slate-500">MM7</div><div class="font-bold text-yellow-400">89.45</div></div>
            <div><div class="text-slate-500">MM50</div><div class="font-bold text-purple-400">87.20</div></div>
            <div><div class="text-slate-500">MM100</div><div class="font-bold text-pink-400">85.10</div></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Init Graphique TradingView
        new TradingView.widget({
            "autosize": true,
            "symbol": "EURONEXT:ABVX",
            "interval": "15",
            "timezone": "Europe/Paris",
            "theme": "dark",
            "style": "1",
            "locale": "fr",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "container_id": "chart_container",
            "studies": [
                { id: "MASimple@tv-basicstudies", inputs: { length: 7 } },
                { id: "MASimple@tv-basicstudies", inputs: { length: 50 } },
                { id: "MASimple@tv-basicstudies", inputs: { length: 100 } }
            ]
        });

        // Simuler une mise à jour des probabilités (IA)
        function updatePredictions() {
            // Ici on injecterait les données calculées par le modèle Python/FinBERT
            const p7 = (Math.random() * (85 - 70) + 70).toFixed(1);
            document.getElementById('p7').innerText = p7 + "% ↑";
        }
        setInterval(updatePredictions, 15000);
    </script>
</body>
</html>
